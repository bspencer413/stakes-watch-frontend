<script type="text/babel">
const { useState, useEffect } = React;

/* SKIN BLOCK -- mirrors what reskinner v0.3 will produce. */
const APP_NAME = 'Stakes Watch';
const APP_VERSION = '0.3.8';
const API_BASE = 'https://stakes-watch-backend.onrender.com';
const SW_REPO = 'https://raw.githubusercontent.com/bspencer413/stakes-watch-frontend/main';
const SIGNIN_BG = SW_REPO + '/sw-bg.jpg';
const BILL_PHOTO = 'https://raw.githubusercontent.com/bspencer413/memorial-watch/main/Bill.jpeg';
const TAGLINE = 'What stakes are you watching?';
const TAGLINE_SUB = 'Track prediction markets on Kalshi';
const DEFAULT_THRESHOLD = 10;

const isPhone = window.innerWidth < 500;
const isTablet = window.innerWidth >= 500 && window.innerWidth < 1024;
const PT = isPhone ? '36vh' : isTablet ? '40vh' : '38vh';

// ============================================================================
// AuthGate v0.3.3 — 3Brains portable account + anonymous-storage component
// ============================================================================
//
// PURPOSE
// Drop-in component for any 3Brains app. Handles:
//   1. Anonymous users save up to freeAnonLimit items to localStorage
//   2. At the cap, the signup modal opens automatically
//   3. On signup, localStorage items migrate to the server
//   4. Returning users sign in via the same modal
//
// INSTALL IN A NEW 3BRAINS APP
//   (a) Paste this entire block into the host index.html immediately AFTER
//       the SKIN BLOCK constants (so API_BASE is already declared).
//   (b) Adjust AUTH_GATE_CONFIG below for the host app:
//         - apiBase, tokenKey, userKey, anonStorageKey, anonSnapshotPrefix
//         - appName, saveActionLabel, itemNoun, upgradeBenefit
//         - accentColor (CSS var reference for the host app)
//   (c) Inside the App() component, at the very top, add:
//         const gate = useAuthGate(AUTH_GATE_CONFIG);
//   (d) Use the gate interface throughout App:
//         - gate.isAuthed (boolean)
//         - gate.user (object or null)
//         - gate.list (saved items array, anon localStorage or server)
//         - gate.add(item) — routes anon vs server, enforces cap
//         - gate.remove(id) — routes anon vs server
//         - gate.requireAuth(callback) — gate any action behind sign-in
//         - gate.openSignup() / gate.openSignin() — open the modal manually
//         - gate.signOut() — clear token + user, list flips to anon
//   (e) Render once at the root of the App return:
//         {gate.modal}                  // v0.3.1: JSX, not a component
//   (f) Render <gate.CounterBanner /> on save-list pages (anon-only display)
//   (g) Render <gate.EmptyState message="..." /> on auth-gated tabs
//
// BACKEND REQUIREMENTS (already met by all 3Brains backends)
//   POST {registerEndpoint} {email, password} -> {access_token, token_type}
//   POST {loginEndpoint} {email, password} -> {access_token, token_type}
//   GET {watchlistEndpoint} -> [{id, name, location, ...}, ...]
//   POST {watchlistEndpoint} {name, location} -> {id, name, location}
//   DELETE {watchlistEndpoint}/{id} -> any 2xx
//
// MIGRATION FROM PASSWORD TO MAGIC-LINK (Phase 2 / Step B)
//   Swap the body of submitModal() to call the magic-link request endpoint
//   and replace the password input with a single email field. The public
//   surface (gate.add, gate.requireAuth, etc.) does not change — host apps
//   keep working without modification.
//
// CONSTRAINTS (matches all 3Brains apps)
//   - No JS spread operators (iOS Safari friction). Uses Object.assign / concat.
//   - No Tailwind JIT arbitrary classes. All styling is inline-style objects.
//   - React 18 via CDN + Babel. No build toolchain.
//   - Dark theme assumed. Colors configurable via accentColor + modalBg.
// ============================================================================

// --- PER-APP CONFIG ---------------------------------------------------------
// Adjust these values when installing in a new 3Brains app.
const AUTH_GATE_CONFIG = {
  apiBase: API_BASE,
  tokenKey: 'token',
  userKey: 'user',
  anonStorageKey: 'sw_anon_watchlist',
  anonSnapshotPrefix: 'sw_market_',
  watchlistEndpoint: '/watchlist',
  loginEndpoint: '/auth/login',
  registerEndpoint: '/auth/register',
  freeAnonLimit: 5,
  appName: 'Stakes Watch',
  saveActionLabel: 'save this market',
  itemNoun: 'markets',
  upgradeBenefit: 'unlimited saves and 12-hour price-move alerts',
  accentColor: 'var(--sw-accent)',
  modalBg: 'rgba(10,21,37,0.80)',
  modalBackdropImage: SIGNIN_BG,
  stayLoggedInDefault: true
};

// --- HOOK -------------------------------------------------------------------
function useAuthGate(config) {
  const [isAuthed, setIsAuthed] = useState(false);
  const [user, setUser] = useState(null);
  const [list, setList] = useState([]);
  const [listLoading, setListLoading] = useState(false);
  const [modalOpen, setModalOpen] = useState(false);
  const [modalMode, setModalMode] = useState('signup'); // 'signup' | 'signin'
  const [modalMessage, setModalMessage] = useState(null);
  const [modalEmail, setModalEmail] = useState('');
  const [modalPassword, setModalPassword] = useState('');
  const [modalShowPwd, setModalShowPwd] = useState(false);
  const [modalLoading, setModalLoading] = useState(false);
  const [modalError, setModalError] = useState(null);
  const [pendingAction, setPendingAction] = useState(null);
  const [backendWaking, setBackendWaking] = useState(false);
  // v0.3.1: persistence toggle. true = localStorage (survives browser close).
  // false = sessionStorage (cleared on browser/tab close).
  const [stayLoggedIn, setStayLoggedIn] = useState(
    config.stayLoggedInDefault !== false
  );

  // -- localStorage helpers
  const readAnonList = () => {
    try {
      const raw = localStorage.getItem(config.anonStorageKey);
      return raw ? JSON.parse(raw) : [];
    } catch (e) { return []; }
  };
  const writeAnonList = (items) => {
    try { localStorage.setItem(config.anonStorageKey, JSON.stringify(items)); }
    catch (e) { console.error('AuthGate: failed to write anon list', e); }
  };
  const genAnonId = () => 'anon_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

  // -- v0.3.1 Storage helpers: route between localStorage (persistent) and
  //    sessionStorage (cleared on browser close), based on stayLoggedIn.
  const readToken = () => {
    return localStorage.getItem(config.tokenKey) || sessionStorage.getItem(config.tokenKey);
  };
  const readUserRaw = () => {
    return localStorage.getItem(config.userKey) || sessionStorage.getItem(config.userKey);
  };
  const writeAuth = (token, userJson, persistent) => {
    localStorage.removeItem(config.tokenKey);
    localStorage.removeItem(config.userKey);
    sessionStorage.removeItem(config.tokenKey);
    sessionStorage.removeItem(config.userKey);
    const store = persistent ? localStorage : sessionStorage;
    store.setItem(config.tokenKey, token);
    store.setItem(config.userKey, userJson);
  };
  const clearAuth = () => {
    localStorage.removeItem(config.tokenKey);
    localStorage.removeItem(config.userKey);
    sessionStorage.removeItem(config.tokenKey);
    sessionStorage.removeItem(config.userKey);
  };

  // -- Server fetch helpers
  const serverGet = async () => {
    const t = readToken();
    const r = await fetch(config.apiBase + config.watchlistEndpoint, {
      headers: { 'Authorization': 'Bearer ' + t }
    });
    if (!r.ok) throw new Error('Failed to load list');
    return await r.json();
  };
  const serverAdd = async (item) => {
    // v0.3.1: pass item shape through unchanged. Host app controls payload.
    const t = readToken();
    const r = await fetch(config.apiBase + config.watchlistEndpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + t },
      body: JSON.stringify(item)
    });
    if (!r.ok) throw new Error('Failed to save');
    return await r.json();
  };
  const serverRemove = async (id) => {
    const t = readToken();
    const r = await fetch(config.apiBase + config.watchlistEndpoint + '/' + id, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + t }
    });
    if (!r.ok) throw new Error('Failed to remove');
    return true;
  };

  // -- Refresh the public list (anon localStorage or server, depending on auth)
  const refreshList = async () => {
    setListLoading(true);
    try {
      if (isAuthed) setList(await serverGet());
      else setList(readAnonList());
    } catch (e) {
      console.error('AuthGate refreshList:', e);
      setList([]);
    } finally {
      setListLoading(false);
    }
  };

  // -- Mount: hydrate token + user from either storage (v0.3.1)
  useEffect(() => {
    const t = readToken();
    const u = readUserRaw();
    if (t && u) {
      try { setUser(JSON.parse(u)); setIsAuthed(true); }
      catch (e) { clearAuth(); }
    }
  // eslint-disable-next-line
  }, []);

  // -- Reload list whenever auth flips. Also self-heal: if signed in and any
  //    anon items remain in localStorage (e.g. from a failed migration), retry.
  useEffect(() => {
    refreshList();
    if (isAuthed) {
      const anon = readAnonList();
      if (anon && anon.length > 0) {
        migrateAnonToServer(anon);
      }
    }
  // eslint-disable-next-line
  }, [isAuthed]);

  // -- Anon -> server migration (called on signup, also self-heal on mount)
  //    Atomic per-item: each anon item is POSTed individually, removed from
  //    anon list on success. Partial failure leaves remaining items in anon
  //    storage for a future retry. Snapshot keys are remapped from temp anon
  //    IDs to server IDs as part of the migration.
  const migrateAnonToServer = async (anonItems) => {
    let remaining = anonItems.slice();
    let migrated = 0;
    for (let i = 0; i < anonItems.length; i++) {
      const anonItem = anonItems[i];
      try {
        // v0.3.2: shape-agnostic migration. POST the full anon item minus the
        // client-only id (backend assigns its own). No field cherry-picking.
        const payload = Object.assign({}, anonItem);
        delete payload.id;
        const created = await serverAdd(payload);
        // Remap snapshot key if it exists under the temp anon ID
        try {
          const oldKey = config.anonSnapshotPrefix + anonItem.id;
          const oldSnap = localStorage.getItem(oldKey);
          if (oldSnap) {
            localStorage.setItem(config.anonSnapshotPrefix + created.id, oldSnap);
            localStorage.removeItem(oldKey);
          }
        } catch (e) {}
        remaining = remaining.filter(it => it.id !== anonItem.id);
        writeAnonList(remaining);
        migrated++;
      } catch (e) {
        console.error('AuthGate: migration failed for item', anonItem.id, e);
        break; // leave remaining for retry
      }
    }
    if (remaining.length === 0) {
      try { localStorage.removeItem(config.anonStorageKey); } catch (e) {}
    }
    await refreshList();
    return migrated;
  };

  // -- Modal openers/closer
  const openSignup = (msg) => {
    setModalMode('signup');
    setModalMessage(msg || null);
    setModalEmail(''); setModalPassword('');
    setModalError(null);
    setModalOpen(true);
  };
  const openSignin = (msg) => {
    setModalMode('signin');
    setModalMessage(msg || null);
    setModalEmail(''); setModalPassword('');
    setModalError(null);
    setModalOpen(true);
  };
  const closeModal = () => {
    setModalOpen(false);
    setModalEmail(''); setModalPassword('');
    setModalMessage(null); setModalError(null);
    setPendingAction(null);
  };

  const signOut = () => {
    clearAuth();
    setUser(null);
    setIsAuthed(false);
    // The isAuthed-watching useEffect will reload the list from anon storage
  };

  // -- Public: add an item. Routes anon vs server, enforces anon cap.
  //    Returns the created item ({id, name, location, ...}) on success.
  //    Returns null when the anon cap is hit (AuthGate opens the modal and
  //    queues the action to replay after signup).
  const add = async (item) => {
    if (isAuthed) {
      const created = await serverAdd(item);
      await refreshList();
      return created;
    }
    const current = readAnonList();
    if (current.length >= config.freeAnonLimit) {
      openSignup('You\'ve saved ' + config.freeAnonLimit + ' ' + config.itemNoun
        + '. Sign up for ' + config.upgradeBenefit + '.');
      setPendingAction({ type: 'add', item: item });
      return null;
    }
    const id = genAnonId();
    // v0.3.2: shape-agnostic. Safe defaults first, host item on top (host
    // fields win), then stamp client id + created_at. Preserves whatever
    // shape the host passes to gate.add. No spread (iOS Safari).
    const defaults = { status: 'active', is_resolved: false, resolution_outcome: null };
    const newItem = Object.assign({}, defaults, item, {
      id: id,
      created_at: new Date().toISOString()
    });
    const updated = current.concat([newItem]);
    writeAnonList(updated);
    setList(updated);
    return newItem;
  };

  // -- Public: remove an item by id (anon or server)
  const remove = async (id) => {
    if (isAuthed) {
      await serverRemove(id);
    } else {
      const current = readAnonList();
      const updated = current.filter(it => it.id !== id);
      writeAnonList(updated);
      try { localStorage.removeItem(config.anonSnapshotPrefix + id); } catch (e) {}
    }
    await refreshList();
  };

  // -- Public: gate an arbitrary action behind sign-in. Runs callback
  //    immediately if authed; otherwise opens the modal and replays the
  //    callback after successful sign-in / sign-up.
  const requireAuth = (callback) => {
    if (isAuthed) { callback(); return true; }
    setPendingAction({ type: 'callback', fn: callback });
    openSignup('Sign up to ' + config.saveActionLabel + '.');
    return false;
  };

  // -- Modal submit (calls login or register against backend)
  const submitModal = async () => {
    if (!modalEmail || !modalPassword) {
      setModalError('Email and password required.');
      return;
    }
    setModalLoading(true);
    setModalError(null);
    setBackendWaking(false);
    const wakeTimer = setTimeout(() => setBackendWaking(true), 3000);
    try {
      const endpoint = modalMode === 'signup' ? config.registerEndpoint : config.loginEndpoint;
      const r = await fetch(config.apiBase + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: modalEmail, password: modalPassword })
      });
      clearTimeout(wakeTimer); setBackendWaking(false);
      if (!r.ok) {
        const errBody = await r.json().catch(() => ({}));
        throw new Error(errBody.detail || 'Auth failed');
      }
      const data = await r.json();
      const u = { email: modalEmail, name: modalEmail.split('@')[0] };
      writeAuth(data.access_token, JSON.stringify(u), stayLoggedIn);
      setUser(u);
      setIsAuthed(true);
      // The isAuthed effect handles refreshList + migration

      const pa = pendingAction;
      setPendingAction(null);
      setModalOpen(false);
      setModalEmail(''); setModalPassword('');
      setModalMessage(null);

      // Replay pending action after isAuthed has propagated. We re-do the
      // add through serverAdd directly (not gate.add) because the closure
      // captured the old isAuthed=false.
      // v0.3.3: after the replay, tell the host so it can move the user off the
      // stale search view onto their saved list. Without this, the item that
      // hit the cap is left on screen and re-tapping Save says "already saved".
      const notifyHost = () => {
        if (typeof config.onAuthSuccess === 'function') {
          try { config.onAuthSuccess({ hadPendingAdd: !!(pa && pa.type === 'add') }); }
          catch (e) {}
        }
      };
      if (pa) {
        setTimeout(async () => {
          try {
            if (pa.type === 'callback' && typeof pa.fn === 'function') {
              pa.fn();
            } else if (pa.type === 'add' && pa.item) {
              await serverAdd(pa.item);
              await refreshList();
            }
          } catch (e) { console.error('AuthGate: replay pending action failed', e); }
          notifyHost();
        }, 100);
      } else {
        notifyHost();
      }
    } catch (e) {
      clearTimeout(wakeTimer); setBackendWaking(false);
      setModalError(e.message || 'Auth failed.');
    } finally {
      setModalLoading(false);
    }
  };

  // -- Modal component
  // v0.3.1: Return modal as JSX (use as {gate.modal}). Defining as a closure-based
  // component caused remount-on-every-render, dropping keyboard focus on each keystroke.
  const isSignup = modalMode === 'signup';
  const modal = !modalOpen ? null : (
      <>
        <div onClick={closeModal} style={Object.assign(
          {
            position: 'fixed', top: 0, right: 0, bottom: 0, left: 0, zIndex: 999,
            backgroundColor: 'rgba(0,0,0,0.7)'
          },
          config.modalBackdropImage ? {
            backgroundImage: 'url(' + config.modalBackdropImage + ')',
            backgroundSize: 'cover',
            backgroundPosition: 'center',
            backgroundColor: 'rgba(0,0,0,0.35)'
          } : {}
        )} />
        <div style={{
          position: 'fixed', zIndex: 1000,
          left: '50%', top: '50%', transform: 'translate(-50%, -50%)',
          width: 'calc(100% - 2rem)', maxWidth: '420px',
          backgroundColor: config.modalBg,
          borderRadius: '20px',
          border: '1px solid rgba(255,255,255,0.15)',
          padding: '1.5rem',
          backdropFilter: 'blur(8px)',
          boxShadow: '0 10px 40px rgba(0,0,0,0.6)'
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '0.5rem' }}>
            <h2 style={{ color: '#fff', fontSize: '1.75rem', fontWeight: 700, margin: 0, lineHeight: 1.1 }}>
              {isSignup ? 'Sign up' : 'Sign in'}
            </h2>
            <button onClick={closeModal} type="button" style={{
              background: 'transparent', border: 'none', color: 'rgba(255,255,255,0.6)',
              fontSize: '1.75rem', fontWeight: 700, cursor: 'pointer', lineHeight: 1, padding: '0 0.25rem'
            }}>X</button>
          </div>
          {/* v0.3.1: Always-shown value-prop subhead. Tells the user *why*. */}
          {isSignup && (
            <p style={{ color: 'rgba(255,255,255,0.80)', fontSize: '1rem', lineHeight: 1.4, marginBottom: '0.75rem' }}>
              Sign up for {config.upgradeBenefit}.
            </p>
          )}
          {modalMessage && (
            <p style={{ color: 'rgba(255,255,255,0.85)', fontSize: '1.125rem', lineHeight: 1.4, marginBottom: '1rem' }}>
              {modalMessage}
            </p>
          )}
          <input type="email" placeholder="Email address" value={modalEmail}
            onChange={(e) => setModalEmail(e.target.value)}
            onKeyPress={(e) => e.key === 'Enter' && submitModal()}
            autoComplete="email"
            style={{
              width: '100%', padding: '0.75rem 1rem', borderRadius: '12px',
              backgroundColor: 'rgba(255,255,255,0.1)', border: '1px solid rgba(255,255,255,0.3)',
              color: '#fff', fontSize: '1.125rem', marginBottom: '0.75rem',
              boxSizing: 'border-box', outline: 'none'
            }} />
          <div style={{ position: 'relative', marginBottom: '0.75rem' }}>
            <input type={modalShowPwd ? 'text' : 'password'} placeholder="Password"
              value={modalPassword}
              onChange={(e) => setModalPassword(e.target.value)}
              onKeyPress={(e) => e.key === 'Enter' && submitModal()}
              autoComplete={isSignup ? 'new-password' : 'current-password'}
              style={{
                width: '100%', padding: '0.75rem 3rem 0.75rem 1rem', borderRadius: '12px',
                backgroundColor: 'rgba(255,255,255,0.1)', border: '1px solid rgba(255,255,255,0.3)',
                color: '#fff', fontSize: '1.125rem', boxSizing: 'border-box', outline: 'none'
              }} />
            <button onClick={() => setModalShowPwd(!modalShowPwd)} type="button"
              style={{
                position: 'absolute', right: '0.75rem', top: '50%', transform: 'translateY(-50%)',
                background: 'transparent', border: 'none', color: 'rgba(255,255,255,0.6)',
                cursor: 'pointer', fontSize: '0.875rem', padding: '0.25rem'
              }}>{modalShowPwd ? 'hide' : 'show'}</button>
          </div>
          {backendWaking && (
            <p style={{ color: 'rgba(255,255,255,0.6)', fontSize: '1rem', textAlign: 'center', marginBottom: '0.75rem' }}>
              Waking up the server...
            </p>
          )}
          {modalError && (
            <p style={{ color: '#f87171', fontSize: '1rem', textAlign: 'center', marginBottom: '0.75rem' }}>
              {modalError}
            </p>
          )}

  const CounterBanner = () => {

      <div style={{

  return {

    list: list,
    listLoading: listLoading,
    count: list.length,
    atLimit: atLimit,
    add: add,
    remove: remove,

// ── Helpers ──────────────────────────────────────────────────────────────────
const smartTitleCase = (s) => s ? s.trim().replace(/\s+/g, ' ') : s;

const fmtPrice = (cents) => {
  if (cents === null || cents === undefined || cents === '') return '—';
  return cents + '¢';
};

const fmtPctChange = (oldP, newP) => {
  if (!oldP || !newP || oldP === newP) return '';
  const delta = newP - oldP;
  const pct = (delta / oldP) * 100;
  const sign = delta > 0 ? '+' : '';
  return sign + pct.toFixed(1) + '%';
};

const fmtCountdown = (closeTimeStr) => {
  if (!closeTimeStr) return '';
  try {
    const close = new Date(closeTimeStr);
    const now = new Date();
    const diffMs = close - now;
    if (diffMs <= 0) return 'Closed';
    const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const mins = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
    if (days > 0) return days + 'd ' + hours + 'h';
    if (hours > 0) return hours + 'h ' + mins + 'm';
    return mins + 'm';
  } catch(e) { return ''; }
};

const fmtVolume = (v) => {
  if (v === null || v === undefined || v === '') return '—';
  const n = Number(v);
  if (isNaN(n)) return '—';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return String(n);
};

const fmtPriceDelta = (current, previous) => {
  if (current === null || current === undefined || previous === null || previous === undefined) return null;
  if (current === previous) return null;
  const diff = current - previous;
  const arrow = diff > 0 ? '▲' : '▼';
  return arrow + Math.abs(diff) + '¢';
};

const fmtClockTime = (d) => {
  try {
    const dt = d || new Date();
    return dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  } catch(e) { return ''; }
};

// Prefer event-level title as the main heading — it's the actual question
// ("Will OpenAI IPO?"). Market.title is sometimes just the answer slug
// ("Before 2030") for multi-option events, which is meaningless on its own.
const marketHeading = (m) => {
  if (!m) return '';
  const evt = (m.event_title || '').trim();
  const t = (m.title || m.subtitle || m.ticker || '').trim();
  return evt || t || '';
};

// The market's specific option/answer, shown alongside the heading when distinct.
// Returns empty string when event_title and market title carry the same content.
const marketDetail = (m) => {
  if (!m) return '';
  const evt = (m.event_title || '').trim();
  const t = (m.title || m.subtitle || '').trim();
  if (evt && t && evt !== t) return t;
  return '';
};

const snapshotChanged = (oldSnap, newSnap, thresholdPct) => {
  if (!oldSnap || !newSnap) return true;
  if ((oldSnap.result || '') !== (newSnap.result || '') && newSnap.result) return true;
  if ((oldSnap.status || '') !== (newSnap.status || '')) return true;
  const oldP = oldSnap.last_price;
  const newP = newSnap.last_price;
  if (typeof oldP === 'number' && typeof newP === 'number' && oldP > 0) {
    const pct = Math.abs((newP - oldP) / oldP) * 100;
    if (pct >= (thresholdPct || DEFAULT_THRESHOLD)) return true;
  }
  return false;
};

// MarketPanel — full market detail (My Markets drawer mode)
const MarketPanel = ({ market, savedSnap, thresholdPct }) => {
  if (!market) return <p className="text-gray-300 text-xl text-center py-3">No market data available right now.</p>;

  const status = (market.status || '').toLowerCase();
  const result = (market.result || '').toLowerCase();
  const last = market.last_price;
  const savedLast = savedSnap ? savedSnap.last_price : null;
  const noPrice = (last !== null && last !== undefined) ? (100 - last) : null;

  // Status badge color
  var badgeColor = 'bg-emerald-700';
  var badgeText = 'OPEN';
  if (result === 'yes') { badgeColor = 'bg-emerald-700'; badgeText = 'RESOLVED YES'; }
  else if (result === 'no') { badgeColor = 'bg-red-700'; badgeText = 'RESOLVED NO'; }
  else if (status === 'closed' || status === 'settled' || status === 'determined' || status === 'finalized') { badgeColor = 'bg-slate-600'; badgeText = 'CLOSED'; }

  // Price delta vs saved
  var deltaText = '';
  var deltaColor = 'text-gray-300';
  if (typeof last === 'number' && typeof savedLast === 'number' && last !== savedLast) {
    const delta = last - savedLast;
    const pct = (delta / savedLast) * 100;
    deltaText = (delta > 0 ? '+' : '') + delta + '¢ (' + (delta > 0 ? '+' : '') + pct.toFixed(1) + '%)';
    deltaColor = delta > 0 ? 'text-emerald-400' : 'text-red-400';
  }

  const countdown = fmtCountdown(market.close_time);

  return (
    <div className="space-y-3">
      <div className={'px-4 py-2 rounded-xl text-center ' + badgeColor}>
        <p className="text-white font-bold text-2xl tracking-wider">{badgeText}</p>
      </div>

      {/* Big YES price */}
      <div className="bg-black/40 border border-white/10 rounded-xl p-4 text-center">
        <p className="text-gray-400 text-sm uppercase tracking-wide mb-1">Current YES</p>
        <p className="text-white text-6xl font-bold" style={{ fontFamily: 'var(--sw-display-font)' }}>{fmtPrice(last)}</p>
        {deltaText && <p className={'text-xl font-bold mt-1 ' + deltaColor}>{deltaText}</p>}
        {savedLast !== null && savedLast !== undefined && (
          <p className="text-gray-400 text-base mt-2">You saved at {fmtPrice(savedLast)}</p>
        )}
      </div>

      {/* NO / volume / countdown row */}
      <div className="grid grid-cols-3 gap-2">
        <div className="bg-black/30 border border-white/10 rounded-lg p-3 text-center">
          <p className="text-gray-400 text-xs uppercase mb-1">NO</p>
          <p className="text-white text-2xl font-bold">{fmtPrice(noPrice)}</p>
        </div>
        <div className="bg-black/30 border border-white/10 rounded-lg p-3 text-center">
          <p className="text-gray-400 text-xs uppercase mb-1">Vol 24h</p>
          <p className="text-white text-2xl font-bold">{fmtVolume(market.volume_24h)}</p>
        </div>
        <div className="bg-black/30 border border-white/10 rounded-lg p-3 text-center">
          <p className="text-gray-400 text-xs uppercase mb-1">Closes</p>
          <p className="text-white text-2xl font-bold">{countdown || '—'}</p>
        </div>
      </div>

      {/* Sub-titles */}
      {(market.yes_sub_title || market.no_sub_title) && (
        <div className="bg-black/30 border border-white/10 rounded-xl p-3">
          {market.yes_sub_title && <p className="text-emerald-300 text-base mb-1"><span className="font-bold">YES:</span> {market.yes_sub_title}</p>}
          {market.no_sub_title && <p className="text-red-300 text-base"><span className="font-bold">NO:</span> {market.no_sub_title}</p>}
        </div>
      )}

      {/* Threshold + close time + category */}
      <div className="bg-black/30 border border-white/10 rounded-xl p-3 space-y-1">
        <div className="flex justify-between text-white text-base">
          <span className="text-gray-400">Alert threshold</span>

            <span className="text-gray-400">Category</span>
            <strong>{market.category}</strong>
          </div>
        )}
      </div>
    </div>
  );

  }, [autoOpenId, page, watchlist]);

  // Categories are unauthed data -- anon users see them too.
  useEffect(() => {
    if (categories.length === 0) {
      fetchKalshiCategories().then(list => { if (list && list.length) setCategories(list); });
    }
    // eslint-disable-next-line
  }, []);

  // Load markets for the currently-selected category. Re-runs when user picks a different category.
  useEffect(() => {
    if (!currentCategory) { setCategoryMarkets([]); setCategoryFetchedAt(null); return; }
    setCategoryLoading(true);
    fetchKalshiMarketsByCategory(currentCategory, 30).then(list => {
      setCategoryMarkets(list || []);
      setCategoryFetchedAt(new Date());
      setCategoryLoading(false);
    });
  }, [currentCategory]);

  // Backwards-compat alias -- watchlist loading is owned by AuthGate.
  const loadWatchlist = () => gate.refreshList();
  const loadNotifications = async () => {
    try {
      const token = gate.getToken();
      const r = await fetch(API_BASE + '/notifications', { headers: { 'Authorization': 'Bearer ' + token } });
      if (!r.ok) throw new Error('Failed');
      setNotifications(await r.json());
    } catch (e) { console.error(e); }
  };
  const dismissAlert = async (notifId) => {
    const token = gate.getToken();
    setNotifications(prev => prev.filter(n => n.id !== notifId));
    try { await fetch(API_BASE + '/notifications/' + notifId, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } }); } catch(e) {}
  };
  const viewAlert = (n) => {
    const wItem = watchlist.find(w => w.id === n.watchlist_id);
    if (wItem) { setPage('mymarkets'); setAutoOpenId(wItem.id); }
  };
  // doAuth removed -- AuthGate owns register/login via gate.openSignup() and gate.openSignin().
  const doLogout = () => {
    gate.signOut();
    setSearchResults(null); setSearched(false); setSelectedMarket(null);
    setPage('search');
  };
  const doDeleteAccount = async () => {
    try {
      const token = gate.getToken();
      const r = await fetch(API_BASE + '/account', { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
      if (!r.ok) throw new Error('Failed');
      doLogout(); alert('Your account has been permanently deleted.');
    } catch (error) { alert('Error: ' + error.message); }
  };
  const clearSearch = () => { setSearchResults(null); setSearched(false); setSelectedMarket(null); setSearchQuery(''); setCurrentCategory(null); setCategoryMarkets([]); };
  const isOnList = (ticker) => { if (!ticker) return false; return !!watchlist.find(w => { const m = parseMeta(w.location); return m && m.ticker === ticker; }); };
  const parseMeta = (locationField) => { if (!locationField) return null; try { return JSON.parse(locationField); } catch(e) { return null; } };

  const doSearch = async (overrideQuery) => {
    if (document.activeElement) document.activeElement.blur();
    const rawQ = overrideQuery !== undefined && overrideQuery !== null ? overrideQuery : searchQuery;
    const q = (rawQ || '').trim();
    if (!q || q.length < 2) { alert('Please enter a search keyword.'); return; }
    if (overrideQuery !== undefined && overrideQuery !== null) setSearchQuery(q);
    setSearching(true); setSearchResults(null); setSelectedMarket(null);
    try {
      const markets = await fetchKalshiSearch(q);
      setSearchResults({ markets, query: q });
      setSearched(true);
      if (markets.length === 1) setSelectedMarket(markets[0]);
    } catch(e) { setSearchResults({ markets: [], query: q }); setSearched(true); }
    finally { setSearching(false); }
  };

  // Tap a featured market → jump straight to the save flow as if it were a 1-result search
  const pickFeatured = (m) => {
    setSearchResults({ markets: [m], query: m.title || m.ticker });
    setSelectedMarket(m);
    setSearched(true);
  };

  // SAVE: route through AuthGate (anon -> localStorage with 5-cap, authed -> server).
  // Then snapshot to localStorage, navigate to My Markets, auto-open the drawer.
  const saveMarket = async () => {
    if (!selectedMarket) return;
    if (isOnList(selectedMarket.ticker)) { alert('That market is already on your watchlist.'); return; }
    const heading = marketHeading(selectedMarket);
    const detail = marketDetail(selectedMarket);
    const title = detail ? heading + ' · ' + detail : (heading || selectedMarket.ticker);
    setLoadingSave(true);
    try {
      const meta = JSON.stringify({
        platform: 'kalshi',
        ticker: selectedMarket.ticker,
        event_ticker: selectedMarket.event_ticker,
        event_title: selectedMarket.event_title || '',
        event_sub_title: selectedMarket.event_sub_title || '',
        subtitle: selectedMarket.subtitle || '',
        yes_sub_title: selectedMarket.yes_sub_title || '',
        no_sub_title: selectedMarket.no_sub_title || '',
        category: selectedMarket.category || '',
        close_time: selectedMarket.close_time || '',
        savedYesPrice: selectedMarket.last_price,
        savedAt: new Date().toISOString(),
        threshold: DEFAULT_THRESHOLD
      });
      const created = await gate.add({ name: title, location: meta });
      if (!created) {
        // Hit the anon 5-cap -- AuthGate opened the signup modal.
        return;
      }
      // Snapshot the fresh Kalshi data under the new item id (anon or server).
      const fresh = await fetchKalshiMarket(selectedMarket.ticker).catch(() => null);
      const snap = buildSnapshot(fresh || selectedMarket);
      if (snap && created.id) saveSnapshot(created.id, snap);
      clearSearch(); setPage('mymarkets');
      if (created.id) setAutoOpenId(created.id);
    } catch(e) { alert('Error: ' + e.message); }
    finally { setLoadingSave(false); }
  };

  const delMarket = async (id) => {
    try {
      await gate.remove(id);
      deleteSnapshotLocal(id);
    } catch (error) { alert('Error: ' + error.message); }
  };

  // Watchlist drawer (light): title + saved price + Check button
  const openWatchlistDrawer = async (wItem) => {
    const meta = parseMeta(wItem.location);
    const snap = getSnapshot(wItem.id);
    setDrawerData({ mode: 'watchlist', name: wItem.name, watchlistId: wItem.id, meta: meta, snapshot: snap, market: null, loading: false });
  };

  // My Markets drawer (full): re-fetch fresh Kalshi data
  const openMyMarketsDrawer = async (wItem) => {
    const meta = parseMeta(wItem.location);
    let snap = getSnapshot(wItem.id);
    setDrawerData({ mode: 'mymarkets', name: wItem.name, watchlistId: wItem.id, meta: meta, snapshot: snap, market: null, loading: true });
    if (meta && meta.ticker) {
      const fresh = await fetchKalshiMarket(meta.ticker).catch(() => null);
      if (fresh) {
        const newSnap = buildSnapshot(fresh);
        if (newSnap) { saveSnapshot(wItem.id, newSnap); snap = newSnap; }
        setDrawerData(prev => prev ? Object.assign({}, prev, { market: fresh, snapshot: snap, loading: false }) : null);
      } else {
        setDrawerData(prev => prev ? Object.assign({}, prev, { loading: false }) : null);
      }
    } else {
      setDrawerData(prev => prev ? Object.assign({}, prev, { loading: false }) : null);
    }
  };

  // Check for price move (transforms watchlist drawer into mymarkets drawer if changed)
  const checkForPriceMove = async () => {
    if (!drawerData || !drawerData.watchlistId) return;
    const meta = drawerData.meta;
    if (!meta || !meta.ticker) { alert('No Kalshi ticker linked to this market.'); return; }
    setChecking(true);
    try {
      const fresh = await fetchKalshiMarket(meta.ticker);
      if (!fresh) { alert('Could not reach Kalshi. Try again later.'); return; }
      const now = Date.now();
      const newSnap = buildSnapshot(fresh);
      const oldSnap = getSnapshot(drawerData.watchlistId);
      const threshold = (meta && meta.threshold) || DEFAULT_THRESHOLD;
      if (!snapshotChanged(oldSnap, newSnap, threshold)) {
        showToast('No move past your threshold');
        setDrawerData(prev => prev ? Object.assign({}, prev, { lastCheckedAt: now, market: fresh }) : null);
        return;
      }
      saveSnapshot(drawerData.watchlistId, newSnap);
      setDrawerData(prev => prev ? Object.assign({}, prev, { mode: 'mymarkets', snapshot: newSnap, market: fresh, lastCheckedAt: now }) : null);
    } catch(e) { alert('Error: ' + e.message); }
    finally { setChecking(false); }
  };

  const unreadCount = notifications.length;
  const iClass = "w-full px-4 py-3 border border-white/30 rounded-lg focus:ring-2 focus:ring-teal-400 text-xl bg-black/40 text-white placeholder-gray-400";
  const cardClass = "rounded-2xl p-4 shadow-lg backdrop-blur-sm";
  const cardStyle = { backgroundColor: 'var(--sw-card-bg)', borderColor: 'var(--sw-card-border)', borderWidth: '1px' };
  const containerClass = (page === 'about') ? 'w-full max-w-3xl mx-auto px-3' : 'w-full px-3';

  const MarketCard = ({ market, showSaveButton }) => {
    if (!market) return null;
    const heading = marketHeading(market);
    const detail = marketDetail(market);
    const alreadySaved = isOnList(market.ticker);
    const last = market.last_price;
    const noPrice = (last !== null && last !== undefined) ? (100 - last) : null;
    return (
      <div className="rounded-2xl overflow-hidden border border-white/15 shadow-lg" style={{ backgroundColor: 'rgba(10,21,37,0.65)' }}>
        <div className="px-5 py-3 text-center" style={{ background: 'linear-gradient(90deg, #0d3a3a, #0a1f4a)' }}>
          <p className="text-white font-bold text-2xl leading-snug">{heading}</p>
          {detail && <p className="text-white/80 text-lg mt-1">Option: <strong>{detail}</strong></p>}
          {market.category && <p className="text-white/70 text-base uppercase tracking-wider mt-1">{market.category}</p>}
        </div>
        <div className="p-4 space-y-3">
          <div className="grid grid-cols-3 gap-2">
            <div className="bg-black/30 border border-white/10 rounded-lg p-3 text-center">
              <p className="text-gray-400 text-xs uppercase mb-1">YES</p>
              <p className="text-emerald-300 text-3xl font-bold" style={{ fontFamily: 'var(--sw-display-font)' }}>{fmtPrice(last)}</p>
            </div>
            <div className="bg-black/30 border border-white/10 rounded-lg p-3 text-center">
              <p className="text-gray-400 text-xs uppercase mb-1">NO</p>
              <p className="text-red-300 text-3xl font-bold" style={{ fontFamily: 'var(--sw-display-font)' }}>{fmtPrice(noPrice)}</p>
            </div>
            <div className="bg-black/30 border border-white/10 rounded-lg p-3 text-center">
              <p className="text-gray-400 text-xs uppercase mb-1">Closes</p>
              <p className="text-white text-xl font-bold">{fmtCountdown(market.close_time) || '—'}</p>
            </div>
          </div>
          {market.yes_sub_title && <p className="text-emerald-200 text-base"><span className="font-bold">YES:</span> {market.yes_sub_title}</p>}
          {market.no_sub_title && <p className="text-red-200 text-base"><span className="font-bold">NO:</span> {market.no_sub_title}</p>}
          {market.volume_24h !== undefined && market.volume_24h !== null && <p className="text-gray-400 text-base">Vol 24h: <strong className="text-white">{fmtVolume(market.volume_24h)}</strong></p>}
          {showSaveButton && (
            <div className="space-y-2 pt-2">
              {alreadySaved ? <p className="text-emerald-300 text-xl text-center font-bold">Already on your watchlist</p> : <button onClick={saveMarket} disabled={loadingSave} className="w-full py-4 text-white rounded-xl font-bold text-2xl flex items-center justify-center gap-2 disabled:opacity-50" style={{ backgroundColor: 'var(--sw-accent)' }}><PlusIcon /> {loadingSave ? 'Saving...' : 'Save Market'}</button>}
              <button onClick={clearSearch} className="w-full py-3 bg-white/10 border border-white/20 text-white/80 rounded-xl text-xl text-center">Clear Search</button>
            </div>
          )}
          <p className="text-gray-400 text-sm text-center pt-1">Prices: Kalshi</p>
        </div>
      </div>
    );
  };

  const Drawer = () => {
    if (!drawerData) return null;
    const { mode, name, meta, snapshot, market, loading: drawerLoading, lastCheckedAt } = drawerData;
    const threshold = (meta && meta.threshold) || DEFAULT_THRESHOLD;
    return (
      <>
        <div className="modal-overlay" onClick={() => setDrawerData(null)} />
        <div className="modal-drawer">
          <div className="flex justify-between items-center px-4 pt-4 pb-2 border-b border-white/15">
            <h3 className="text-white font-bold text-2xl leading-snug pr-2">{name}</h3>
            <button onClick={() => setDrawerData(null)} className="text-gray-400 hover:text-white text-2xl font-bold shrink-0">X</button>
          </div>
          <div className="p-4">
            {drawerLoading && <div className="text-center py-8"><p className="text-white animate-pulse text-xl">Loading...</p></div>}
            {!drawerLoading && (
              <>
                {mode === 'watchlist' && (
                  <div className="space-y-3">
                    <div className="bg-black/40 border border-white/10 rounded-xl p-4 text-center">
                      <p className="text-gray-400 text-sm uppercase tracking-wide mb-1">You saved at</p>
                      <p className="text-white text-5xl font-bold" style={{ fontFamily: 'var(--sw-display-font)' }}>{snapshot ? fmtPrice(snapshot.last_price) : '—'}</p>
                      {snapshot && snapshot.capturedAt && <p className="text-gray-400 text-base mt-2">{new Date(snapshot.capturedAt).toLocaleString()}</p>}
                    </div>
                    {(meta && meta.yes_sub_title) && <p className="text-emerald-200 text-base text-center"><span className="font-bold">YES:</span> {meta.yes_sub_title}</p>}
                    <p className="text-gray-400 text-base text-center">Alert threshold: <strong className="text-white">{threshold}%</strong></p>
                    {lastCheckedAt && <p className="text-white/60 text-sm text-center">Last checked {new Date(lastCheckedAt).toLocaleString()}</p>}
                    <button onClick={checkForPriceMove} disabled={checking} className="w-full py-4 text-white rounded-xl font-bold text-2xl flex items-center justify-center gap-2 disabled:opacity-50" style={{ backgroundColor: 'var(--sw-accent)' }}>
                      <RefreshIcon /> {checking ? 'Checking...' : 'Check current price'}
                    </button>
                  </div>
                )}
                {mode === 'mymarkets' && <MarketPanel market={market} savedSnap={snapshot} thresholdPct={threshold} />}
                {mode === 'mymarkets' && snapshot && snapshot.capturedAt && (<p className="text-white/40 text-sm text-center mt-3">Last updated {new Date(snapshot.capturedAt).toLocaleString()}</p>)}
                {mode === 'mymarkets' && (<p className="text-gray-400 text-sm text-center mt-2">Prices: Kalshi</p>)}
              </>
            )}
            <button onClick={() => setDrawerData(null)} className="w-full py-4 bg-white/10 border border-white/20 text-white rounded-xl text-xl mt-4">Close</button>
          </div>
        </div>
      </>
    );
  };

  // [v0.3.0] Login splash removed. AuthGate handles sign-in/sign-up modally.
  // Anonymous users land on the Search page; the modal opens on Save-at-cap
  // or via the Info page Sign Up / Sign In buttons.

  return (
    <PageWrapper>
      {gate.modal}
      <Drawer />
      {toast && (
        <div style={{ position: 'fixed', left: '50%', transform: 'translateX(-50%)', bottom: 'calc(6rem + env(safe-area-inset-bottom))', zIndex: 200, backgroundColor: 'var(--sw-accent)', color: '#0a1525', padding: '1.1rem 1.8rem', borderRadius: '999px', border: '1px solid rgba(255,255,255,0.25)', fontSize: '1.5rem', fontWeight: 700, boxShadow: '0 6px 20px rgba(0,0,0,0.6)', whiteSpace: 'nowrap' }}>{toast}</div>
      )}
      <div className={containerClass}>

        {page === 'search' && (
          <div className="space-y-3" style={{ paddingTop: PT }}>
            <div className="flex flex-col items-center" style={{ height: PT, marginTop: '-' + PT, paddingTop: isPhone ? '1rem' : '4rem', paddingBottom: isPhone ? '0.75rem' : '1.5rem', pointerEvents: 'none' }}>
              <h1 className="text-white text-center" style={{ fontSize: isPhone ? '5.5rem' : '9rem', fontFamily: 'var(--sw-display-font)', letterSpacing: '0.05em', lineHeight: 0.9, textShadow: '0 4px 16px rgba(0,0,0,0.9)', textTransform: 'uppercase', fontWeight: 700 }}>Stakes<br/>Watch</h1>
              <p className="text-white text-center" style={{ fontSize: isPhone ? '1.75rem' : '2.75rem', fontFamily: 'var(--sw-display-font)', letterSpacing: '0.04em', lineHeight: 1.05, textShadow: '0 2px 8px rgba(0,0,0,0.9)', marginTop: isPhone ? '0.5rem' : '1rem', textTransform: 'uppercase', fontWeight: 500 }}>What stakes are<br/>you watching?</p>
              <p className="text-white/90 text-center" style={{ fontSize: isPhone ? '1.125rem' : '1.5rem', lineHeight: 1.3, textShadow: '0 2px 6px rgba(0,0,0,0.85)', marginTop: isPhone ? '0.4rem' : '0.75rem', maxWidth: '32ch', marginLeft: 'auto', marginRight: 'auto', paddingLeft: '1rem', paddingRight: '1rem' }}>Pick a market.<br/>Add to your Watchlist.<br/>We'll watch the price for you.</p>
            </div>
            <div className={cardClass} style={Object.assign({}, cardStyle, { overflowY: 'auto', maxHeight: 'calc(100dvh - ' + PT + ' - 6rem)' })}>
              {searching && <p className="text-white text-center py-4 animate-pulse text-xl">Searching Kalshi...</p>}
              {!searched ? (
                <div className="space-y-4">

                  {/* Primary: keyword search. Kalshi users typically know what question they want to watch. */}
                  {!currentCategory && (
                    <div>
                      <ClearableInput value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && doSearch()} placeholder="e.g. Fed, Bitcoin, hurricane" inputClass={iClass} />
                      <button onClick={() => doSearch()} disabled={searching} className="w-full py-3 mt-2 text-white rounded-lg flex items-center justify-center gap-2 disabled:opacity-50 text-lg font-bold" style={{ backgroundColor: 'var(--sw-accent)' }}>
                        <SearchIcon /> {searching ? 'Searching...' : 'Search'}
                      </button>
                    </div>
                  )}

                  {/* Drilldown: markets within selected category */}
                  {currentCategory && (
                    <div>
                      <div className="flex items-center justify-between mb-2">
                        <button onClick={() => setCurrentCategory(null)} className="text-white/80 text-base underline">← Categories</button>
                        <p className="text-white text-xl font-bold" style={{ fontFamily: 'var(--sw-display-font)', letterSpacing: '0.04em', textTransform: 'uppercase' }}>{currentCategory}</p>
                        <span className="text-white/40 text-xs w-16 text-right">{categoryMarkets.length}</span>
                      </div>
                      {!categoryLoading && categoryMarkets.length > 0 && (
                        <div className="flex flex-col items-center mb-3">
                          <p className="text-white/80 text-sm text-center leading-snug">Tap a market → <span className="text-emerald-300 font-semibold">Watchlist</span> (hourly alerts) or <span className="text-emerald-300 font-semibold">My Stakes</span> (instant updates)</p>
                          {categoryFetchedAt && <p className="text-white/40 text-xs mt-1">As of {fmtClockTime(categoryFetchedAt)}</p>}
                        </div>
                      )}
                      {categoryLoading && <p className="text-white/70 text-center py-6 animate-pulse text-lg">Loading markets...</p>}
                      {!categoryLoading && categoryMarkets.length === 0 && (
                        <p className="text-white/50 text-center py-4 text-base">No active markets in this category right now. Try another.</p>
                      )}
                      {!categoryLoading && categoryMarkets.length > 0 && (
                        <div className="space-y-2">
                          {categoryMarkets.map((m, i) => {
                            const heading = marketHeading(m);
                            const detail = marketDetail(m);
                            const title = detail ? heading + ' · ' + detail : heading;
                            const delta = fmtPriceDelta(m.last_price, m.previous_price);
                            const deltaUp = delta && delta.charAt(0) === '▲';
                            const countdown = fmtCountdown(m.close_time);
                            const hasYes = m.last_price !== null && m.last_price !== undefined;
                            const noPrice = hasYes ? (100 - m.last_price) : null;
                            return (
                              <button key={i} onClick={() => pickFeatured(m)} className="w-full p-3 bg-black/40 border border-white/15 rounded-xl text-left hover:bg-black/60">
                                <p className="text-white text-lg font-bold leading-snug">{title}</p>
                                <div className="flex items-center gap-2 mt-1 flex-wrap">
                                  {hasYes && <span className="text-emerald-300 text-base font-bold">{fmtPrice(m.last_price)} YES</span>}
                                  {hasYes && <span className="text-white/40">·</span>}
                                  {hasYes && <span className="text-red-300 text-base font-bold">{fmtPrice(noPrice)} NO</span>}
                                  {delta && <span className={(deltaUp ? 'text-emerald-300' : 'text-red-300') + ' text-sm font-bold'}>{delta}</span>}
                                </div>
                                <div className="flex items-center gap-3 mt-1 flex-wrap">
                                  {countdown && <span className="text-white/60 text-xs">Closes in {countdown}</span>}
                                  {m.volume_24h !== undefined && m.volume_24h !== null && m.volume_24h > 0 && <span className="text-white/60 text-xs">Vol {fmtVolume(m.volume_24h)}</span>}
                                </div>
                              </button>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  )}

                  {/* Secondary: browse by category */}
                  {!currentCategory && (
                    <div className="pt-3 border-t border-white/15">
                      <p className="text-white/80 text-lg text-center mb-3 font-semibold" style={{ fontFamily: 'var(--sw-display-font)', letterSpacing: '0.03em', textTransform: 'uppercase' }}>Or browse by category</p>
                      <div className="grid grid-cols-2 gap-2">
                        {categories.length === 0 && <p className="col-span-2 text-white/50 text-center py-3 text-base animate-pulse">Loading categories...</p>}
                        {categories.map(c => (
                          <button key={c} onClick={() => setCurrentCategory(c)}
                            className="p-4 bg-black/40 border border-white/20 rounded-xl text-white text-lg font-bold hover:bg-black/60"
                            style={{ fontFamily: 'var(--sw-display-font)', letterSpacing: '0.03em', textTransform: 'uppercase' }}>
                            {c}
                          </button>
                        ))}
                      </div>
                    </div>
                  )}

                  <p className="text-gray-400 text-xs text-center pt-2">Tap a market to save it. Source: Kalshi.</p>
                </div>
              ) : (<SearchResultView />)}
            </div>
          </div>
        )}

        {page === 'watchlist' && (
          <div className="space-y-3" style={{ paddingTop: '1rem' }}>
            <div className={cardClass} style={cardStyle}>
              <CardPageHeader title="Watchlist" subtitle="Tap a market -- check current price" />
              <gate.CounterBanner />
              {watchlist.length === 0 && (<div className="py-6 text-center"><p className="text-gray-200 text-xl leading-relaxed mb-2">No markets yet.</p><p className="text-white text-xl font-medium">Use Search to add markets.</p></div>)}
              {watchlist.length > 0 && (
                <div className="space-y-2 mt-2">
                  {watchlist.map(w => {
                    const meta = parseMeta(w.location);
                    const snap = getSnapshot(w.id);
                    return (
                      <div key={w.id} className="p-4 rounded-lg border bg-black/40 border-white/15">
                        <div className="flex items-center justify-between">
                          <div className="flex-1 min-w-0">
                            <button onClick={() => openWatchlistDrawer(w)} className="text-left w-full">
                              <h3 className="font-semibold text-2xl text-white underline decoration-dotted leading-snug">{w.name}</h3>
                            </button>
                            <div className="flex items-center gap-3 mt-1 flex-wrap">
                              {snap && snap.last_price !== undefined && <span className="text-emerald-300 text-xl font-bold">{fmtPrice(snap.last_price)} YES</span>}
                              {meta && meta.category && <span className="text-white/60 text-base uppercase">{meta.category}</span>}
                              {meta && meta.close_time && <span className="text-white/60 text-base">{fmtCountdown(meta.close_time)} to close</span>}
                            </div>
                            {w.is_resolved && <div className="flex items-center gap-1 mt-1"><span className={'text-xl font-bold ' + (w.resolution_outcome === 'YES' ? 'text-emerald-300' : 'text-red-300')}>Resolved {w.resolution_outcome}</span></div>}
                            {!w.is_resolved && <div className="flex items-center gap-1 mt-1"><CheckIcon /><span className="text-xl text-green-300">Watching</span></div>}
                          </div>
                          <button onClick={() => delMarket(w.id)} className="p-2 text-red-400 hover:bg-red-900/30 rounded-lg ml-2 shrink-0"><TrashIcon /></button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        )}

        {page === 'mymarkets' && (
          <div className="space-y-3" style={{ paddingTop: '1rem' }}>
            <div className={cardClass} style={cardStyle}>
              <CardPageHeader title="My Markets" subtitle="Live prices and resolution status" />
              <gate.CounterBanner />
              {watchlist.length === 0 ? (<div className="text-center py-6"><p className="text-gray-200 text-xl leading-relaxed">Search for a market and save it here.</p></div>) : (
                <div className="space-y-3">
                  <p className="text-gray-300 text-lg text-center mb-1">Tap a market for live data</p>
                  {watchlist.map(w => {
                    const meta = parseMeta(w.location);
                    const snap = getSnapshot(w.id);
                    return (
                      <div key={w.id} className="p-4 bg-black/50 rounded-lg border border-white/15">
                        <div className="flex items-start justify-between">
                          <div className="flex-1 min-w-0">
                            <button onClick={() => openMyMarketsDrawer(w)} className="text-left w-full">
                              <h3 className="font-semibold text-2xl text-white underline decoration-dotted leading-snug">{w.name}</h3>
                            </button>
                            <div className="flex items-center gap-3 mt-2 flex-wrap">
                              {snap && snap.last_price !== undefined && <span className="text-emerald-300 text-2xl font-bold" style={{ fontFamily: 'var(--sw-display-font)' }}>{fmtPrice(snap.last_price)}</span>}
                              {meta && meta.category && <span className="text-white/60 text-base uppercase">{meta.category}</span>}
                            </div>
                            {meta && meta.close_time && <p className="text-base text-white/60 mt-1">{fmtCountdown(meta.close_time)} to close</p>}
                            {w.is_resolved && <p className={'text-xl font-bold mt-1 ' + (w.resolution_outcome === 'YES' ? 'text-emerald-300' : 'text-red-300')}>Resolved {w.resolution_outcome}</p>}
                          </div>
                          <button onClick={() => delMarket(w.id)} className="p-2 text-red-400 hover:bg-red-900/30 rounded-lg ml-2 shrink-0"><TrashIcon /></button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        )}

        {page === 'notifications' && (
          <div className="space-y-3" style={{ paddingTop: '1rem' }}>
            <div className={cardClass} style={cardStyle}>
              <CardPageHeader title="Alerts" subtitle="Price moves, resolutions, time-to-close" />
              {!gate.isAuthed ? (
                <gate.EmptyState message="Sign up to get 12-hour price-move alerts when your markets shift." ctaLabel="Sign up" />
              ) : notifications.length === 0 ? (<div className="text-center py-4"><p className="text-white font-bold text-2xl">No alerts yet</p><p className="text-gray-200 text-xl mt-1">We check your markets every 12 hours.</p></div>) : (
                <div className="space-y-3">
                  {notifications.map(n => (
                    <div key={n.id} className="p-3 bg-black/50 border border-white/15 rounded-xl">
                      <h3 className="font-bold text-white text-xl mb-1 leading-snug">{n.name}</h3>
                      <p className="text-gray-200 text-xl">{n.message}</p>
                      <p className="text-gray-400 text-base mt-1 mb-2">{new Date(n.created_at).toLocaleString()}</p>
                      <div className="flex gap-2">
                        <button onClick={() => viewAlert(n)} className="flex-1 py-2 text-white rounded-lg text-xl font-bold" style={{ backgroundColor: 'var(--sw-accent)' }}>View</button>
                        <button onClick={() => dismissAlert(n.id)} className="flex-1 py-2 bg-transparent border border-white/30 text-white/80 rounded-lg text-xl">Dismiss</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {page === 'about' && (
          <div className="space-y-4 pb-8" style={{ paddingTop: '1rem' }}>
            <div className={cardClass} style={cardStyle}>
              <div className="mb-3 pb-2 border-b border-white/15 text-center">
                <h2 className="text-4xl font-bold text-white" style={{ fontFamily: 'var(--sw-display-font)', letterSpacing: '0.08em', textTransform: 'uppercase' }}>About</h2>
                <h2 className="text-4xl font-bold text-white" style={{ fontFamily: 'var(--sw-display-font)', letterSpacing: '0.08em', textTransform: 'uppercase' }}>{APP_NAME}</h2>
              </div>
              <p className="text-white/80 italic text-xl text-center mb-3">v{APP_VERSION}</p>
              <div className="flex items-center gap-4 mb-4">
                <img src={BILL_PHOTO} alt="Bill Spencer" className="w-14 h-14 rounded-full object-cover border-2 border-white/30 shrink-0" />
                <div>
                  <p className="font-bold text-white text-xl">Bill Spencer</p>
                  <p className="text-white/70 italic text-xl">Founder</p>
                  <a href="mailto:hello@stakeswatch.app" className="text-white/80 text-xl mt-1 block">hello@stakeswatch.app</a>
                </div>
              </div>
              <p className="text-white text-2xl font-bold italic mb-3">{TAGLINE}</p>
              <div className="space-y-3 text-gray-100 text-xl leading-relaxed">
                <p>The prediction markets you care about, all in one place.</p>
                <p>Add any open market on Kalshi — politics, the Fed, crypto, sports, weather, awards — to your watchlist. Stakes Watch tracks the price and tells you when it moves past your threshold, when it's about to resolve, and when it does.</p>
                <p>We're not a broker. We don't take trades. We just watch the markets you pick.</p>
              </div>
            </div>
            <div className={cardClass} style={cardStyle}>
              <h3 className="text-white text-2xl font-bold mb-4 text-center" style={{ fontFamily: 'var(--sw-display-font)', letterSpacing: '0.05em', textTransform: 'uppercase' }}>How it works</h3>
              <div className="space-y-4">
                <div className="flex gap-3 items-start"><span className="text-white text-2xl font-bold w-7 shrink-0">1.</span><p className="text-gray-100 text-xl">Search for a market by keyword: "Fed", "Bitcoin", "Super Bowl", "hurricane".</p></div>
                <div className="flex gap-3 items-start"><span className="text-white text-2xl font-bold w-7 shrink-0">2.</span><p className="text-gray-100 text-xl">Save the ones you want to follow. We capture the current YES price.</p></div>
                <div className="flex gap-3 items-start"><span className="text-white text-2xl font-bold w-7 shrink-0">3.</span><p className="text-gray-100 text-xl">Tap a market on Watchlist to check the current price right now.</p></div>
                <div className="flex gap-3 items-start"><span className="text-white text-2xl font-bold w-7 shrink-0">4.</span><p className="text-gray-100 text-xl">We check every hour. If a market moves past 10%, hits its 24h or 1h close window, or resolves — you get an alert.</p></div>
              </div>
            </div>
            <div className={cardClass} style={cardStyle}>
              <h3 className="text-white text-2xl font-bold mb-3 text-center" style={{ fontFamily: 'var(--sw-display-font)', letterSpacing: '0.05em', textTransform: 'uppercase' }}>What kinds of markets trade</h3>
              <p className="text-white/50 text-base text-center italic mb-4">Reference guide — expanded in future versions</p>
              <div className="space-y-3 text-gray-100 text-xl leading-relaxed">
                <p><strong className="text-white">Politics & elections</strong> — vote outcomes, approval ratings, primary results.</p>
                <p><strong className="text-white">Economy & Fed</strong> — rate decisions, inflation prints, GDP releases.</p>
                <p><strong className="text-white">Crypto</strong> — Bitcoin and Ethereum price targets, ETF flows.</p>
                <p><strong className="text-white">Sports</strong> — Super Bowl, NBA championship, World Series, Stanley Cup, World Cup.</p>
                <p><strong className="text-white">Weather</strong> — hurricanes, temperature records, snowfall.</p>
                <p><strong className="text-white">Pop culture</strong> — Oscars, Grammys, Emmys, awards.</p>
                <p><strong className="text-white">Tech</strong> — AI benchmarks, space launches, product milestones.</p>
              </div>
            </div>
            <div className={cardClass} style={cardStyle}>
              <h3 className="font-bold text-white mb-1 text-2xl" style={{ fontFamily: 'var(--sw-display-font)', letterSpacing: '0.05em', textTransform: 'uppercase' }}>Privacy</h3>
              <p className="text-white/60 text-xl mb-3">Last updated: May 2026</p>
              <div className="space-y-3 text-gray-100 text-xl leading-relaxed">
                <p><strong className="text-white">We collect:</strong> your email, watchlist, and search activity.</p>
                <p><strong className="text-white">We do not:</strong> sell your data, ever. We do not place trades or hold money.</p>
                <p><strong className="text-white">Sources:</strong> Market data from Kalshi's public API.</p>
                <p><strong className="text-white">Your rights:</strong> Delete your account and all data anytime.</p>
                <a href="mailto:hello@stakeswatch.app" className="text-white/80 text-xl">hello@stakeswatch.app</a>
              </div>
            </div>
            <div className={cardClass} style={cardStyle}>
              <h3 className="text-white text-2xl font-bold mb-3 text-center">Try our other Watchlist apps</h3>
              <div className="space-y-3">
                <a href="https://3brains.app" target="_blank" rel="noopener noreferrer"
                  className="block w-full py-4 text-white text-center rounded-xl text-xl font-semibold"
                  style={{ backgroundColor: 'var(--sw-accent)' }}>
                  Visit Our Site
                </a>
              </div>
            </div>
            <div className="px-1 space-y-3 pb-2">
              {gate.isAuthed ? (
                <>
                  <div className="p-3 bg-black/40 rounded-xl"><p className="font-medium text-white text-xl text-center">{user && user.email}</p></div>
                  <button onClick={doLogout} className="w-full py-4 text-white rounded-xl text-2xl font-bold" style={{ backgroundColor: 'var(--sw-accent)' }}>Sign Out</button>
                  <button onClick={() => setShowDangerZone(!showDangerZone)} className="w-full py-3 text-white/60 text-xl text-center">{showDangerZone ? 'Hide' : 'Account Removal'}</button>
                  {showDangerZone && (
                    <div className="space-y-3">
                      {!showDeleteConfirm ? <button onClick={() => setShowDeleteConfirm(true)} className="w-full py-4 bg-black/60 border border-white/20 text-red-300 rounded-xl text-xl">Delete Account</button> : <div className="bg-black/80 border border-white/20 rounded-2xl p-5 space-y-3"><h3 className="font-bold text-red-300 text-xl">Are you sure?</h3><p className="text-white/80 text-xl">This permanently deletes your account.</p><button onClick={doDeleteAccount} className="w-full py-4 bg-red-700 text-white rounded-xl font-bold text-xl">Yes, Delete My Account</button><button onClick={() => { setShowDeleteConfirm(false); setShowDangerZone(false); }} className="w-full py-4 bg-white/10 border border-white/20 text-white rounded-xl text-xl">Cancel</button></div>}
                    </div>
                  )}
                </>
              ) : (
                <>
                  <div className="p-3 bg-black/40 rounded-xl text-center">
                    <p className="text-white text-xl mb-2">Trying it out? You can save up to {AUTH_GATE_CONFIG.freeAnonLimit} markets without an account.</p>
                    <p className="text-white/70 text-lg">Sign up for unlimited saves and 12-hour price-move alerts.</p>
                  </div>
                  <button onClick={() => gate.openSignup()} className="w-full py-4 text-white rounded-xl text-2xl font-bold" style={{ backgroundColor: 'var(--sw-accent)' }}>Sign Up</button>
                  <button onClick={() => gate.openSignin()} className="w-full py-3 bg-white/10 border border-white/20 text-white rounded-xl text-xl">Already have an account? Sign In</button>
                </>
              )}
            </div>
            <p className="text-white/40 text-center text-sm pb-4">v{APP_VERSION}</p>
          </div>
        )}

      </div>

      <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, backgroundColor: 'rgba(10,21,37,0.92)', backdropFilter: 'blur(8px)', borderTop: '1px solid rgba(255,255,255,0.15)', padding: '0.5rem 1rem', paddingBottom: 'max(0.5rem, env(safe-area-inset-bottom))' }}>
        <div className="flex justify-around max-w-sm mx-auto">
          <button onClick={() => { clearSearch(); setPage('search'); }} className={'flex flex-col items-center gap-0.5 px-1 py-1 ' + (page === 'search' ? 'text-white' : 'text-gray-400')}><SearchIcon /><span className="text-xl font-medium">Search</span></button>
          <button onClick={() => setPage('watchlist')} className={'flex flex-col items-center gap-0.5 px-1 py-1 ' + (page === 'watchlist' ? 'text-white' : 'text-gray-400')}><HeartIcon /><span className="text-xl font-medium">Watchlist</span></button>
          <button onClick={() => setPage('mymarkets')} className={'flex flex-col items-center gap-0.5 px-1 py-1 ' + (page === 'mymarkets' ? 'text-white' : 'text-gray-400')}>
            <ChartIcon />
            <span className="text-xl font-medium">My Markets</span>
          </button>
          <button onClick={() => setPage('about')} className={'flex flex-col items-center gap-0.5 px-1 py-1 ' + (page === 'about' ? 'text-white' : 'text-gray-400')}><InfoIcon /><span className="text-xl font-medium">Info</span></button>
          <button onClick={() => setPage('notifications')} className={'flex flex-col items-center gap-0.5 px-1 py-1 relative ' + (page === 'notifications' ? 'text-white' : 'text-gray-400')}>
            <BellIcon red={unreadCount > 0} />
            {unreadCount > 0 && <span className="absolute top-0 right-1 text-white text-xl font-bold rounded-full w-4 h-4 flex items-center justify-center" style={{ backgroundColor: 'var(--sw-accent-2)' }}>{unreadCount > 9 ? '9+' : unreadCount}</span>}
            <span className="text-xl font-medium">Alerts</span>
          </button>
        </div>
        <p className="text-center text-white/40 text-xs mt-1" style={{ display: page === 'search' ? 'none' : 'block' }}>app v{APP_VERSION} | api v{apiVersion}</p>
      </div>
    </PageWrapper>
  );

  function SearchResultView() {
    if (!searchResults) return null;
    const { markets, query } = searchResults;
    if (!selectedMarket && markets.length > 1) {
      return (
        <div className="rounded-2xl overflow-hidden border border-white/15 shadow-lg" style={{ backgroundColor: 'rgba(10,21,37,0.65)' }}>
          <div className="px-5 py-3 text-center" style={{ background: 'linear-gradient(90deg, #0d3a3a, #0a1f4a)' }}><p className="text-white font-bold text-2xl">{markets.length} markets found</p><p className="text-white/80 text-xl">Pick one</p></div>
          <div className="p-4 space-y-2">
            {markets.map((m, i) => {
              const heading = marketHeading(m);
              const detail = marketDetail(m);
              const title = detail ? heading + ' · ' + detail : heading;
              return (
                <button key={i} onClick={() => setSelectedMarket(m)} className="w-full p-3 bg-black/40 border border-white/15 rounded-xl text-left">
                  <p className="text-white text-xl font-bold leading-snug">{title}</p>
                  <div className="flex items-center gap-3 mt-1 flex-wrap">
                    {m.last_price !== null && m.last_price !== undefined && <span className="text-emerald-300 text-xl font-bold">{fmtPrice(m.last_price)} YES</span>}
                    {m.category && <span className="text-white/60 text-sm uppercase">{m.category}</span>}
                    {m.close_time && <span className="text-white/60 text-sm">{fmtCountdown(m.close_time)} to close</span>}
                  </div>
                </button>
              );
            })}
            <button onClick={clearSearch} className="w-full py-3 bg-white/10 border border-white/20 text-white/80 rounded-xl text-xl text-center mt-2">Clear Search</button>
          </div>
        </div>
      );
    }
    if (markets.length === 0) {
      return (
        <div className="rounded-2xl overflow-hidden border border-white/15 shadow-lg" style={{ backgroundColor: 'rgba(10,21,37,0.65)' }}>
          <div className="px-5 py-3 text-center" style={{ background: 'linear-gradient(90deg, #0d3a3a, #0a1f4a)' }}><p className="text-white font-bold text-2xl">No markets matched "{query}"</p></div>
          <div className="p-4">
            <p className="text-gray-200 text-xl text-center py-2">Try a broader keyword (e.g. "fed", "bitcoin", "election").</p>
            <button onClick={clearSearch} className="w-full py-3 bg-white/10 border border-white/20 text-white/80 rounded-xl text-xl text-center mt-2">Clear Search</button>
          </div>
        </div>
      );
    }
    return <MarketCard market={selectedMarket || markets[0]} showSaveButton={true} />;
  }
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
